<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie – Inoperando</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0F0F0D;
    color: #F5F0E8;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    max-width: 600px;
    text-align: center;
    background: #1A1A17;
    padding: 48px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #5AA9D9;
    margin-bottom: 16px;
  }
  p {
    color: #6B6760;
    margin-bottom: 32px;
    font-size: 1.1rem;
  }
  .btn {
    display: inline-block;
    padding: 12px 32px;
    background: #5AA9D9;
    color: #0F0F0D;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .btn:hover {
    background: #ff5c12;
  }
  @media (max-width: 600px) {
    .container { padding: 24px; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Grazie!</h1>
  <p>La tua richiesta è stata inviata con successo.<br>Riceverai un nostro riscontro al più presto.</p>
  <a href="index.html" class="btn">Torna alla home</a>
</div>
</body>
</html>
